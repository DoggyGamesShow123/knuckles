<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Sonic Delta</title>
  <style>
    body {
      margin: 0;
      background: #000;
      overflow: hidden;
    }
    #game {
      width: 100vw;
      height: 100vh;
      display: none;
    }
    #startButton {
      display: block;
      width: 180px;
      height: 50px;
      margin: 40px auto;
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div id="game"></div>
  <button id="startButton">PLAY</button>

  <script>
    function startGame() {
      document.getElementById("game").style.display = "block";
      document.getElementById("startButton").style.display = "none";

      // EmulatorJS config (same as your original)
      EJS_player = "#game";
      EJS_core = "segaMD";
      EJS_color = "#000000";
      EJS_startOnLoaded = true;
      EJS_pathtodata = "https://cdn.jsdelivr.net/gh/genizy/emu@master/";

      // Updated ROM URL (raw.githubusercontent.com)
      EJS_gameUrl = "https://raw.githubusercontent.com/DoggyGamesShow123/gen/main/roms/SonicDeltaReloaded.bin";

      // Load EmulatorJS loader
      var script = document.createElement("script");
      script.src = "https://cdn.jsdelivr.net/gh/genizy/emu@master/loader.js";
      document.body.appendChild(script);
    }

    document.getElementById("startButton").addEventListener("click", startGame);
  </script>
</body>
</html>
