<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Sonic 2 - Game Gear Overlay</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
  }

  /* Main stage */
  #stage {
    position: fixed;
    inset: 0;
    background: black;
  }

  /*
    Emulator viewport
    Positioned exactly inside the Game Gear screen area
  */
  #viewport {
    position: absolute;

    /* centered */
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    /*
      Adjust these values if needed for perfect fit
      These are tuned for the Game Gear bezel image
    */
    width: 38vw;
    aspect-ratio: 4 / 3;

    max-width: 720px;
    max-height: 540px;

    background: black;
    overflow: hidden;

    z-index: 2;
  }

  /* Emulator iframe */
  #emulator {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
    background: black;
  }

  /* Game Gear bezel overlay */
  #bezel {
    position: absolute;
    inset: 0;

    background:
      url("https://raw.githubusercontent.com/libretro/overlay-borders/master/16x9%20Collections/Nosh01%201440%20Plain/Sega-Game-Gear-Bezel-16x9-2560x1440.png")
      center center / contain no-repeat;

    pointer-events: none;
    z-index: 3;
  }

  /* Mobile adjustments */
  @media (max-width: 900px) {
    #viewport {
      width: 52vw;
    }
  }

  @media (max-width: 600px) {
    #viewport {
      width: 68vw;
    }
  }
</style>
</head>

<body>

<div id="stage">

  <!-- Emulator -->
  <div id="viewport">
    <iframe
      id="emulator"
      src="https://doggygamesshow123.github.io/knuckles/newer%20save%20added/s2.html"
      allow="autoplay; fullscreen"
    ></iframe>
  </div>

  <!-- Overlay -->
  <div id="bezel"></div>

</div>

</body>
</html>
