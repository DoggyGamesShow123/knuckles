<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Sonic 2 - Game Gear Overlay</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
  }

  #stage {
    position: fixed;
    inset: 0;
    background: black;
  }

  /* PERFECT alignment for NyNy77 Game Gear bezel */
  #viewport {
    position: absolute;

    /* Center on page */
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    /* Fine‑tuned offsets for THIS bezel */
    margin-left: 1.9vw;   /* moves right */
    margin-top: -0.9vw;   /* moves up */

    width: 36.5vw;        /* NyNy77 screen is slightly smaller */
    aspect-ratio: 4 / 3;

    max-width: 700px;
    max-height: 525px;

    background: black;
    overflow: hidden;
    z-index: 2;
  }

  #emulator {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
    background: black;
  }

  #bezel {
    position: absolute;
    inset: 0;
    background:
      url("https://raw.githubusercontent.com/libretro/overlay-borders/master/16x9%20Collections/NyNy77%201080%20Bezel/SegaGameGear-nyny77.png")
      center center / contain no-repeat;
    pointer-events: none;
    z-index: 3;
  }

  @media (max-width: 900px) {
    #viewport { width: 50vw; }
  }

  @media (max-width: 600px) {
    #viewport { width: 65vw; }
  }
</style>
</head>

<body>

<div id="stage">

  <!-- WebRetro Emulator -->
  <div id="viewport">
    <iframe
      id="emulator"
      src="https://doggygamesshow123.github.io/webretro/?core=genesis_plus_gx&rom=https://raw.githubusercontent.com/DoggyGamesShow123/knuckles/main/newer%20save%20added/Sonic%20The%20Hedgehog%202%20(U)%20%5B!%5D.gg"
      allow="autoplay; fullscreen"
    ></iframe>
  </div>

  <!-- NyNy77 Game Gear Bezel -->
  <div id="bezel"></div>

</div>

<!-- AUTO-PRESS START FOR WEBRETRO LOADING SCREEN -->
<script>
window.addEventListener("load", () => {
  const frame = document.getElementById("emulator");

  frame.onload = () => {
    // Press START (Enter)
    frame.contentWindow.postMessage(
      { type: "keydown", key: "Enter" }, "*"
    );

    // Release START
    setTimeout(() => {
      frame.contentWindow.postMessage(
        { type: "keyup", key: "Enter" }, "*"
      );
    }, 120);
  };
});
</script>

</body>
</html>
