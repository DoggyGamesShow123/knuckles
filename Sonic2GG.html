<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Sonic 2 - Game Gear Overlay</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
  }

  #stage {
    position: fixed;
    inset: 0;
    background: black;
  }

  /* PERFECT alignment for NyNy77 Game Gear bezel */
  #viewport {
    position: absolute;

    /* Center on page */
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    /* Fine‑tuned offsets for THIS bezel */
    margin-left: 2.4vw;   /* moves right */
    margin-top: -2.1vw;   /* moves up */

    /* Screen size tuned to bezel cutout */
    width: 34.8vw;
    aspect-ratio: 4 / 3;

    max-width: 690px;
    max-height: 517px;

    background: black;
    overflow: hidden;
    z-index: 2;
  }

  #emulator {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
    background: black;
  }

  #bezel {
    position: absolute;
    inset: 0;
    background:
      url("https://raw.githubusercontent.com/libretro/overlay-borders/master/16x9%20Collections/NyNy77%201080%20Bezel/SegaGameGear-nyny77.png")
      center center / contain no-repeat;
    pointer-events: none;
    z-index: 3;
  }

  @media (max-width: 900px) {
    #viewport { width: 48vw; }
  }

  @media (max-width: 600px) {
    #viewport { width: 62vw; }
  }
</style>
</head>

  <!-- WebRetro Emulator -->

      allow="autoplay; fullscreen"
    ></iframe>
  </div>

  <!-- NyNy77 Game Gear Bezel -->
  <div id="bezel"></div>

</div>
